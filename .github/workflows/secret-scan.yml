name: Secret Scan
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  secret-scan:
    uses: selamy-labs/.github/.github/workflows/secret-scan.yml@main
    with:
      runner: ubuntu-latest
